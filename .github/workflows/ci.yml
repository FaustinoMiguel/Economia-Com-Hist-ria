name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: testes automatizados ─────────────────────────────────────────────
  backend-tests:
    name: Backend — Testes (Jest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        working-directory: backend
        run: npm ci

      - name: Correr testes
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-for-ci
          DB_HOST: localhost
          DB_USER: root
          DB_PASSWORD: ''
          DB_NAME: test_db
          PORT: 3001
          CORS_ORIGIN: http://localhost:5173

  # ── Backend: build TypeScript ──────────────────────────────────────────────────
  backend-build:
    name: Backend — Build TypeScript
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        working-directory: backend
        run: npm ci

      - name: Compilar TypeScript
        working-directory: backend
        run: npm run build

  # ── Frontend: build Vite ───────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build Vite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Build de produção
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://api.exemplo.ao
